<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Creativo | MongoDB Atlas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass w-full max-w-lg p-8 shadow-2xl">
        <h1 class="text-3xl font-bold text-white mb-2 text-center">Inicio de sesión</h1>
        <p class="text-indigo-100 text-center mb-8 text-sm">Conéctate con tu cuenta de MongoDB Atlas</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 p-3 rounded {% if category == 'success' %}bg-green-400/30 text-green-100{% else %}bg-red-400/30 text-red-100{% endif %} text-sm">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-white text-sm font-medium mb-1">Usuario</label>
                <input type="text" name="usuario" required class="w-full bg-white/20 border-none rounded-lg p-3 text-white placeholder-indigo-200 focus:ring-2 focus:ring-white outline-none transition-all" placeholder="Ingresa tu usuario">
            </div>

            <div>
                <label class="block text-white text-sm font-medium mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full bg-white/20 border-none rounded-lg p-3 text-white placeholder-indigo-200 focus:ring-2 focus:ring-white outline-none transition-all" placeholder="Tu contraseña">
            </div>

            <button type="submit" class="w-full bg-white text-indigo-700 font-bold py-3 rounded-lg hover:bg-indigo-50 transition-colors shadow-lg">
                Iniciar sesión
            </button>
        </form>

        <p class="mt-6 text-center text-indigo-100 text-sm">
            ¿No tienes cuenta? <a href="{{ url_for('registro') }}" class="font-bold text-white underline">Regístrate aquí</a>
        </p>
    </div>

</body>
</html>
